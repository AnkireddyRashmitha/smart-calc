<!-- pregnancy.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregnancy Due Date Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
width:100%;
max-width:450px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

.info{
background:#eff6ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
line-height:1.6;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:8px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:25px;
background:#eff6ff;
padding:20px;
border-radius:10px;
line-height:2;
}

.result h2{
color:#2563eb;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🤰 Pregnancy Calculator</h1>

<div class="info">
Enter your Last Menstrual Period (LMP) to estimate your due date and pregnancy week.
</div>

<label>Last Menstrual Period (LMP)</label>
<input type="date" id="lmp">

<label>Average Cycle Length (Days)</label>
<input type="number" id="cycle" value="28">

<button onclick="calculatePregnancy()">
Calculate
</button>

<div class="result">

<h2>Results</h2>

<p id="dueDate">Due Date:</p>

<p id="weeks">Pregnancy Week:</p>

<p id="daysLeft">Days Remaining:</p>

</div>

</div>

<script>

function calculatePregnancy(){

const lmp =
new Date(document.getElementById("lmp").value);

const cycle =
parseInt(document.getElementById("cycle").value);

if(!lmp){
alert("Select LMP date");
return;
}

const dueDate = new Date(lmp);

dueDate.setDate(
dueDate.getDate() + 280 + (cycle - 28)
);

const today = new Date();

const diff =
today - lmp;

const weeks =
Math.floor(diff / (1000*60*60*24*7));

const remaining =
Math.floor(
(dueDate - today) / (1000*60*60*24)
);

document.getElementById("dueDate").innerHTML =
"Due Date: " +
dueDate.toDateString();

document.getElementById("weeks").innerHTML =
"Pregnancy Week: " + weeks;

document.getElementById("daysLeft").innerHTML =
"Days Remaining: " + remaining;

}

</script>

</body>
</html>
