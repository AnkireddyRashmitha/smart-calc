<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#16a34a;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.result{
    margin-top:25px;
    background:#f0fdf4;
    padding:20px;
    border-radius:10px;
}

.result h2{
    color:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<h1>🥗 Calorie Calculator</h1>

<label>Age</label>
<input type="number" id="age">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<button onclick="calculateCalories()">Calculate Calories</button>

<div class="result">

<h2>Daily Calories</h2>

<p><strong>Calories Needed:</strong> 
<span id="result"></span> kcal/day</p>

</div>

</div>

<script>

function calculateCalories(){

let age = parseFloat(document.getElementById("age").value);

let weight = parseFloat(document.getElementById("weight").value);

let height = parseFloat(document.getElementById("height").value);

let gender = document.getElementById("gender").value;

let calories;

if(gender === "male"){

calories = 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);

}else{

calories = 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);

}

document.getElementById("result").innerHTML = calories.toFixed(2);

}

</script>

</body>
</html>
