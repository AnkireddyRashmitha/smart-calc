<!-- countdown.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
width:100%;
max-width:450px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:8px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:25px;
background:#eff6ff;
padding:20px;
border-radius:10px;
text-align:center;
}

.result h2{
color:#2563eb;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⏳ Countdown Calculator</h1>

<label>Event Name</label>
<input type="text" id="eventName" placeholder="Birthday">

<label>Select Date & Time</label>
<input type="datetime-local" id="targetDate">

<button onclick="startCountdown()">Start Countdown</button>

<div class="result">
<h2 id="title">Countdown Result</h2>
<p id="output">Enter date and time</p>
</div>

</div>

<script>
let timer;

function startCountdown(){

clearInterval(timer);

const eventName =
document.getElementById("eventName").value;

const target =
new Date(document.getElementById("targetDate").value);

if(!target){
alert("Select date");
return;
}

timer = setInterval(()=>{

const now = new Date();

const diff = target - now;

if(diff <= 0){

clearInterval(timer);

document.getElementById("output").innerHTML =
"🎉 Time Completed!";

return;
}

const days =
Math.floor(diff / (1000*60*60*24));

const hours =
Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes =
Math.floor((diff%(1000*60*60))/(1000*60));

const seconds =
Math.floor((diff%(1000*60))/1000);

document.getElementById("title").innerHTML =
eventName || "Countdown";

document.getElementById("output").innerHTML =
`${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`;

},1000);

}
</script>

</body>
</html>
