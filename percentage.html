<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage Calculator</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    background:#eff6ff;
    padding:20px;
    border-radius:10px;
}

.result h2{
    color:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Percentage Calculator</h1>

<label>Total Number</label>
<input type="number" id="number">

<label>Percentage (%)</label>
<input type="number" id="percent">

<button onclick="calculatePercentage()">
Calculate Percentage
</button>

<div class="result">

<h2>Result</h2>

<p>
Answer:
<strong id="result"></strong>
</p>

</div>

</div>

<script>

function calculatePercentage(){

let number =
parseFloat(document.getElementById("number").value);

let percent =
parseFloat(document.getElementById("percent").value);

let answer =
(number * percent) / 100;

document.getElementById("result").innerHTML =
answer.toFixed(2);

}

</script>

</body>
</html>
