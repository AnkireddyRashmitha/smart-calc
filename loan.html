<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    background:#eff6ff;
    padding:20px;
    border-radius:10px;
}

.result h2{
    color:#2563eb;
}
</style>
</head>

<body>

<div class="container">

<h1>🏦 Loan Calculator</h1>

<label>Loan Amount (₹)</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Interest Rate (%)</label>
<input type="number" id="rate" placeholder="Enter rate">

<label>Loan Tenure (Years)</label>
<input type="number" id="years" placeholder="Enter years">

<button onclick="calculateLoan()">Calculate Loan</button>

<div class="result" id="result">
<h2>Loan Result</h2>

<p><strong>Monthly EMI:</strong> ₹ <span id="emi"></span></p>

<p><strong>Total Payment:</strong> ₹ <span id="total"></span></p>

<p><strong>Total Interest:</strong> ₹ <span id="interest"></span></p>

</div>

</div>

<script>
function calculateLoan(){

let P = parseFloat(document.getElementById("amount").value);

let annualRate = parseFloat(document.getElementById("rate").value);

let years = parseFloat(document.getElementById("years").value);

let r = annualRate / 12 / 100;

let n = years * 12;

let emi = (P * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);

let total = emi * n;

let interest = total - P;

document.getElementById("emi").innerHTML = emi.toFixed(2);

document.getElementById("total").innerHTML = total.toFixed(2);

document.getElementById("interest").innerHTML = interest.toFixed(2);

}
</script>

</body>
</html>
