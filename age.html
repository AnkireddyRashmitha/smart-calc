<!-- age.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#eff6ff;
    padding:20px;
    border-radius:10px;
    display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🎂 Age Calculator</h1>

<input type="date" id="dob">

<button onclick="calculateAge()">
Calculate Age
</button>

<div class="result" id="result">

<h2 id="age"></h2>

</div>

</div>

</div>

<script>

function calculateAge(){

    let dob =
        new Date(document.getElementById("dob").value);

    let today =
        new Date();

    let age =
        today.getFullYear() - dob.getFullYear();

    document.getElementById("age").innerHTML =
        "Your Age: " + age + " Years";

    document.getElementById("result").style.display =
        "block";
}

</script>

</body>
</html>
